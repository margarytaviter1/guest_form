<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="roof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <!-- background circle -->
  <circle cx="32" cy="32" r="30" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <!-- roof -->
  <polygon points="32,10 8,30 56,30" fill="url(#roof)"/>
  <!-- house body -->
  <rect x="14" y="30" width="36" height="22" rx="2" fill="url(#wall)"/>
  <!-- door -->
  <rect x="26" y="36" width="12" height="16" rx="1.5" fill="#92400e"/>
  <!-- door knob -->
  <circle cx="35" cy="45" r="1.2" fill="#fbbf24"/>
  <!-- left window -->
  <rect x="17" y="35" width="7" height="7" rx="1" fill="#7dd3fc" stroke="#0ea5e9" stroke-width="0.8"/>
  <line x1="20.5" y1="35" x2="20.5" y2="42" stroke="#0ea5e9" stroke-width="0.5"/>
  <line x1="17" y1="38.5" x2="24" y2="38.5" stroke="#0ea5e9" stroke-width="0.5"/>
  <!-- right window -->
  <rect x="40" y="35" width="7" height="7" rx="1" fill="#7dd3fc" stroke="#0ea5e9" stroke-width="0.8"/>
  <line x1="43.5" y1="35" x2="43.5" y2="42" stroke="#0ea5e9" stroke-width="0.5"/>
  <line x1="40" y1="38.5" x2="47" y2="38.5" stroke="#0ea5e9" stroke-width="0.5"/>
  <!-- chimney -->
  <rect x="42" y="14" width="6" height="14" rx="1" fill="#b45309"/>
</svg>
